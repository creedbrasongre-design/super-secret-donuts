<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Secret Donuts — Tulsa</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVIGATION BAR -->
  <nav class="nav">
    <div class="nav-left">
      <!-- SVG EYE LOGO -->
      <svg class="logo" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg" aria-label="Super Secret Donuts logo">
        <!-- Eye shape (outer almond) -->
        <path d="M 10 25 Q 50 5 90 25 Q 50 45 10 25 Z" fill="none" stroke="#D4537E" stroke-width="3"/>
        <!-- Iris circle -->
        <circle cx="50" cy="25" r="9" fill="none" stroke="#D4537E" stroke-width="3"/>
        <!-- Pupil dot -->
        <circle cx="50" cy="25" r="3" fill="#D4537E"/>
        <!-- Eyelash rays on top -->
        <line x1="35" y1="10" x2="33" y2="4" stroke="#D4537E" stroke-width="2" stroke-linecap="round"/>
        <line x1="50" y1="7"  x2="50" y2="0" stroke="#D4537E" stroke-width="2" stroke-linecap="round"/>
        <line x1="65" y1="10" x2="67" y2="4" stroke="#D4537E" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="wordmark">SUPER SECRET DONUTS</span>
    </div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Menu</a></li>
      <li><a href="#">Story</a></li>
      <li><a href="#">Find Us</a></li>
    </ul>
    <a href="#" class="order-button">Order Online</a>
  </nav>

  <!-- HERO ZONE -->
  <main class="hero">
    <div class="hero-text">
      <p class="overline">THIS WEEK'S SECRET <span class="arrow">↓</span></p>
      <h1 class="headline">WE'RE NOT TELLING YOU WHAT IT IS.</h1>
      <p class="subtitle">(But we know you'll want one.)</p>
    </div>
    <div class="hero-image">
      <img src="donut-hero.jpg" alt="A pink-glazed donut with electric blue icing drizzle and colorful sprinkles" />
    </div>
  </main>

</body>
</html>
